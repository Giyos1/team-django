{% extends 'base.html' %}

{% block title %}
    {{ book.name }}
{% endblock %}

{% block content %}
    <div class="container mt-4">
        <div class="card shadow-sm">
            <div class="card-header">
                <h3 class="mb-0">{{ book.name }}</h3>
            </div>
            <div class="card-body">
                <table class="table table-borderless mb-0">
                    <tbody>
                    <tr>
                        <th scope="row" style="width: 200px;">#</th>
                        <td>{{ book.id }}</td>
                    </tr>
                    <tr>
                        <th scope="row">Name</th>
                        <td>{{ book.name }}</td>
                    </tr>
                    <tr>
                        <th scope="row">Description</th>
                        <td>{{ book.description }}</td>
                    </tr>
                    <tr>
                        <th scope="row">Price</th>
                        <td>{{ book.price }}</td>
                    </tr>
                    <tr>
                        <th scope="row">Created at</th>
                        <td>{{ book.create_at }}</td>
                    </tr>
                    </tbody>
                </table>
            </div>
            <div class="card-footer d-flex gap-2">
                <a href="{% url 'book_list' %}" class="btn btn-secondary">Back</a>
                <a href="{% url 'update_form_book' book.id %}" class="btn btn-primary">Update</a>
                <a href="{% url 'delete_book' book.id %}" class="btn btn-danger">Delete</a>
            </div>
        </div>
    </div>

{% endblock %}
