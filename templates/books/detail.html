{% extends 'base.html' %}

{% block title %}
    Book Detail
{% endblock %}

{% block content %}

<div class="container mt-5">
    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow-lg border-0 rounded-4">

                <div class="card-header bg-dark text-white text-center py-4">
                    <h2>{{ book.name }}</h2>
                </div>

                <div class="card-body">

                    <div class="mb-4">
                        <h5 class="text-secondary">Description</h5>
                        <p class="fs-5">{{ book.description }}</p>
                    </div>

                    <hr>

                    <div class="row">

                        <div class="col-md-6">
                            <h6 class="text-muted">Price</h6>
                            <h4 class="text-success">{{ book.price }} so'm</h4>
                        </div>

                        <div class="col-md-6">
                            <h6 class="text-muted">Created Date</h6>
                            <h5>{{ book.create_at|date:"d.m.Y" }}</h5>
                        </div>

                    </div>

                </div>

                <div class="card-footer d-flex justify-content-between">

                    <a href="{% url 'book_list' %}" class="btn btn-secondary">
                        ← Back
                    </a>

                    <div>

                        <a href="{% url 'update_book_form' book.id %}"
                           class="btn btn-warning">
                            Update
                        </a>

                        <form action="{% url 'delete_book' book.id %}"
                              method="post"
                              style="display:inline;"
                              onsubmit="return confirm('Rostdan ham ushbu kitobni o‘chirmoqchimisiz?');">

                            {% csrf_token %}

                            <button type="submit" class="btn btn-danger">
                                Delete
                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>
</div>

{% endblock %}
